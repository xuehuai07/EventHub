server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: eventhub-server
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:eventhub}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:eventhub}
    password: ${DB_PASSWORD:eventhub_dev}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:eventhub}
    password: ${RABBITMQ_PASSWORD:eventhub_dev}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

mybatis:
  configuration:
    map-underscore-to-camel-case: true

eventhub:
  media:
    upload-root: ${UPLOAD_ROOT:.data/uploads}
  order:
    payment-timeout: ${ORDER_PAYMENT_TIMEOUT:15m}
    timeout-scan-delay: ${ORDER_TIMEOUT_SCAN_DELAY:60s}
    messaging:
      outbox-scan-delay: ${ORDER_OUTBOX_SCAN_DELAY:5s}
      confirm-timeout: ${ORDER_PUBLISH_CONFIRM_TIMEOUT:5s}
      publisher-enabled: ${ORDER_OUTBOX_PUBLISHER_ENABLED:true}
  auth:
    jwt-secret: ${AUTH_JWT_SECRET:change-this-development-secret-before-production-32-bytes}
    access-token-ttl: ${AUTH_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${AUTH_REFRESH_TOKEN_TTL:14d}
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
    login-max-failures: ${AUTH_LOGIN_MAX_FAILURES:5}
    login-failure-window: ${AUTH_LOGIN_FAILURE_WINDOW:10m}
    login-lock-duration: ${AUTH_LOGIN_LOCK_DURATION:15m}
  ticket:
    qr-secret: ${TICKET_QR_SECRET:change-this-ticket-qr-secret-before-production-32-bytes}
    qr-ttl: ${TICKET_QR_TTL:60s}
  assistant:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
    timeout: ${DEEPSEEK_TIMEOUT:60s}
  bootstrap:
    admin-username: ${BOOTSTRAP_ADMIN_USERNAME:}
    admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    admin-display-name: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:平台管理员}
    merchant-username: ${BOOTSTRAP_MERCHANT_USERNAME:}
    merchant-password: ${BOOTSTRAP_MERCHANT_PASSWORD:}
    merchant-display-name: ${BOOTSTRAP_MERCHANT_DISPLAY_NAME:演示商家员工}
    merchant-name: ${BOOTSTRAP_MERCHANT_NAME:EventHub 演示商家}
